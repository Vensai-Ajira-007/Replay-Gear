services:
  db:
    image: postgres:16
    container_name: replaygear-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: replaygear
    ports:
      - '5432:5432'
    volumes:
      - replaygear_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d replaygear']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: replaygear-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      # Reach Postgres via the compose service name, not localhost.
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: replaygear
    ports:
      - '4000:4000'

volumes:
  replaygear_pgdata:
