services:
  db:
    image: postgres:16
    container_name: replaygear-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: replaygear
    ports:
      - '5432:5432'
    volumes:
      - replaygear_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d replaygear']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  replaygear_pgdata:
