name: Manual DevOps CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: ./Back-end

    steps:
      - name: Post-deployment directory cleanup
        working-directory: ${{ github.workspace }}
        run: |
          echo "Cleaning up workspace..."
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE || true

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: docker compose up -d --build

      - name: Smoke test API
        run: |
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:4000/api/health; then echo " OK"; exit 0; fi
            echo "waiting for API... ($i)"; sleep 2
          done
          echo "API did not become healthy"; docker compose logs api --tail 50; exit 1
